name: Build and release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ''
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ''
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          PROJECT_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          SOURCE="target/${{ matrix.target }}/release/${PROJECT_NAME}${{ matrix.suffix }}"
          mkdir staging
          cp "${SOURCE}" "staging/${PROJECT_NAME}${{ matrix.suffix }}"
          
          cd staging
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip" *
          else
            tar czf "../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" *
          fi
          cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
